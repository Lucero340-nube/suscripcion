<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Suscripción</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .checkbox {
            margin-top: 15px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #43e97b;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2ed573;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Suscríbete</h2>

    <form>
        <label>Correo electrónico:</label>
        <input type="email" required>

        <div class="checkbox">
            <label>
                <input type="checkbox" required>
                Acepto los términos y condiciones
            </label>
        </div>

        <button type="submit">Suscribirme</button>
    </form>
</div>

</body>
</html>
